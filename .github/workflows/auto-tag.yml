name: Auto-tag registry release

# Corta un tag vX.Y.Z al mergear contenido a main, para que `awm update` lo entregue.
# El tag es la versión del REGISTRY (lo único que el CLI consume: pin > último tag > HEAD),
# independiente de las versiones de bundle en catalog.json. Nivel de bump por conventional
# commits del merge. Ver docs/plans/2026-07-22-auto-tag-on-merge-design.md.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/**'

permissions:
  contents: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute and push next tag
        run: |
          set -euo pipefail

          # R4 — idempotencia: si HEAD ya es exactamente un tag vX.Y.Z, no hacer nada.
          if git describe --tags --exact-match HEAD 2>/dev/null | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "HEAD ya está taggeado ($(git describe --tags --exact-match HEAD)) — nada que hacer."
            exit 0
          fi

          # R5 — último tag semver, o v0.0.0 si no hay ninguno.
          LATEST=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
            echo "No hay tags previos — arrancando desde $LATEST."
          fi
          echo "Último tag: $LATEST"

          # R2 — nivel de bump por conventional commits del commit de merge (subject + body).
          MSG="$(git log -1 --format='%s%n%b' HEAD)"
          SUBJECT="$(git log -1 --format='%s' HEAD)"
          if printf '%s' "$SUBJECT" | grep -qE '^[a-z]+(\([^)]+\))?!:' || printf '%s' "$MSG" | grep -qE 'BREAKING[ -]CHANGE'; then
            BUMP="major"
          elif printf '%s' "$SUBJECT" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "Nivel de bump derivado: $BUMP"

          # Calcular el próximo tag.
          VER="${LATEST#v}"
          MAJ="${VER%%.*}"
          REST="${VER#*.}"
          MIN="${REST%%.*}"
          PAT="${REST#*.}"
          case "$BUMP" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEXT="v${MAJ}.${MIN}.${PAT}"
          echo "Próximo tag: $NEXT"

          # Guarda extra: si el tag calculado ya existe (rerun/carrera), salir limpio.
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            echo "$NEXT ya existe — nada que hacer."
            exit 0
          fi

          # R1/R6 — crear y pushear el tag con el GITHUB_TOKEN.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "$NEXT (auto-tag: $BUMP desde $LATEST)"
          git push origin "$NEXT"
          echo "Tag $NEXT pusheado."
